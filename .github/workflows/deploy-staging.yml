name: Deploy Staging

on:
  push:
    branches:
      - main

concurrency:
  cancel-in-progress: true
  group: deploy-staging

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        name: Detect changed slices
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - '.github/workflows/deploy-staging.yml'
              - '.github/workflows/deploy-branch.yml'
            backend:
              - 'apps/api/**'
              - 'packages/**'
              - 'bin/**'
              - 'apps/api/Dockerfile'
              - 'docker-compose.backend.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - '.github/workflows/deploy-vps-reusable.yml'
              - '.github/workflows/deploy-staging.yml'
              - '.github/workflows/deploy-branch.yml'

  verify-web:
    environment: staging
    if: ${{ needs.changes.outputs.web == 'true' }}
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build web app
        run: npm run web:build

  verify-vps:
    environment: staging
    if: ${{ needs.changes.outputs.backend == 'true' }}
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  deploy-web:
    environment: staging
    if: ${{ needs.changes.outputs.web == 'true' }}
    needs:
      - changes
      - verify-web
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel environment
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel app
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel build --token="${{ secrets.VERCEL_TOKEN }}"

      - id: deploy
        name: Deploy to Vercel preview
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOYMENT_URL="$(npx vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "deployment_url=${DEPLOYMENT_URL}" >> "$GITHUB_OUTPUT"

  deploy-vps:
    if: ${{ needs.changes.outputs.backend == 'true' }}
    needs:
      - changes
      - verify-vps
    uses: ./.github/workflows/deploy-vps-reusable.yml
    with:
      deploy_ref: ${{ github.sha }}
      environment_name: staging
    secrets:
      API_PUBLIC_URL: ${{ secrets.API_PUBLIC_URL }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      VPS_APP_PORT: ${{ secrets.VPS_APP_PORT }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_USER: ${{ secrets.VPS_USER }}

  smoke-web:
    environment: staging
    needs:
      - deploy-web
      - deploy-vps
    if: ${{ needs.deploy-web.result == 'success' && (needs.deploy-vps.result == 'success' || needs.deploy-vps.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - name: Smoke test web deployment
        run: curl -fsS "${{ needs.deploy-web.outputs.deployment_url }}"
