name: Deploy VPS Reusable

on:
  workflow_call:
    inputs:
      deploy_ref:
        required: true
        type: string
      environment_name:
        required: true
        type: string
    secrets:
      API_PUBLIC_URL:
        required: true
      DEPLOY_PATH:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      VPS_APP_PORT:
        required: false
      VPS_HOST:
        required: true
      VPS_PORT:
        required: true
      VPS_SSH_KEY:
        required: true
      VPS_USER:
        required: true

jobs:
  deploy-vps:
    environment: ${{ inputs.environment_name }}
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.deploy_ref }}

      - name: Set image reference
        run: |
          echo "MEMORIA_CIVICA_API_IMAGE=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/memoria-civica-api:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.MEMORIA_CIVICA_API_IMAGE }}

      - name: Deploy image on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            APP_PATH="$DEPLOY_PATH/current"
            APP_PORT="${{ secrets.VPS_APP_PORT }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            mkdir -p "$DEPLOY_PATH"

            if [ ! -d "$APP_PATH/.git" ]; then
              rm -rf "$APP_PATH"
              git clone --depth=1 "$REPO_URL" "$APP_PATH"
            fi

            cd "$APP_PATH"
            git fetch --depth=1 origin "${{ inputs.deploy_ref }}"
            git checkout --force "${{ inputs.deploy_ref }}"

            export VPS_APP_PORT="${APP_PORT:-3000}"
            export MEMORIA_CIVICA_API_IMAGE="${{ env.MEMORIA_CIVICA_API_IMAGE }}"

            cat > .deploy.env <<EOF
            MEMORIA_CIVICA_API_IMAGE=${MEMORIA_CIVICA_API_IMAGE}
            VPS_APP_PORT=${VPS_APP_PORT}
            EOF

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker compose --env-file .deploy.env -f docker-compose.backend.yml pull
            docker compose --env-file .deploy.env -f docker-compose.backend.yml up -d

            for attempt in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${VPS_APP_PORT}/health"; then
                exit 0
              fi

              sleep 2
            done

            docker compose --env-file .deploy.env -f docker-compose.backend.yml logs --tail=100
            exit 1

      - name: Smoke test deployed API
        run: |
          curl -fsS "${{ secrets.API_PUBLIC_URL }}/health"
          curl -fsS \
            "${{ secrets.API_PUBLIC_URL }}/consultas" \
            -H 'content-type: application/json' \
            -d '{"candidate_name":"Tabata Amaral","uf":"SP"}'
