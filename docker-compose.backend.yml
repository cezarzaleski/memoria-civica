services:
  memoria-civica-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: memoria-civica-api
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
      MCP_BRASIL_LOCAL_PATH: ${MCP_BRASIL_LOCAL_PATH:-/opt/mcp-brasil}
    ports:
      - "${VPS_APP_PORT:-3000}:3000"
    restart: unless-stopped
