services:
  memoria-civica-api:
    image: ${MEMORIA_CIVICA_API_IMAGE:?MEMORIA_CIVICA_API_IMAGE is required}
    container_name: memoria-civica-api
    environment:
      HOST: 0.0.0.0
      MCP_BRASIL_RUNTIME: python
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${VPS_APP_PORT:-3000}:3000"
    restart: unless-stopped
